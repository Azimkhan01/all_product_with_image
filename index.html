<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Catalogue</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2rem;
      color: #0d9488;
    }

    .header p {
      font-size: 1rem;
      color: #555;
    }

    .product-card {
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .product-title {
      font-size: 1.4rem;
      color: #0d9488;
      margin-bottom: 10px;
    }

    .product-details {
      margin-bottom: 10px;
    }

    .product-details div {
      margin-bottom: 5px;
    }

    .category {
      display: inline-block;
      background: #0d9488;
      color: #fff;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    .image-section {
      margin-top: 15px;
    }

    .main-image {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .thumbnail-grid {
      display: flex;
      gap: 10px;
      overflow-x: auto;
    }

    .thumbnail-grid img {
      height: 60px;
      width: 60px;
      object-fit: cover;
      border-radius: 5px;
      border: 1px solid #ccc;
      cursor: pointer;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .product-title {
        font-size: 1.2rem;
      }

      .main-image {
        max-height: 200px;
      }

      .thumbnail-grid img {
        height: 50px;
        width: 50px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Product Catalogue</h1>
    <p>Explore our range of natural extracts</p>
  </div>

  <div id="product-list">Loading products...</div>

  <script>
    async function loadProducts() {
      try {
        const res = await fetch('All_Products_WithImages.json');
        const products = await res.json();
        const container = document.getElementById('product-list');
        container.innerHTML = '';

        products.forEach(product => {
          const card = document.createElement('div');
          card.className = 'product-card';

          const images = product.images || [];
          const mainImage = images[0] || '';

          card.innerHTML = `
            <div class="product-title">${product["Extract Name"]}</div>
            <div class="product-details">
              <div><strong>Botanical Name:</strong> ${product["Botanical Name"]}</div>
              <div><strong>Part Used:</strong> ${product["Part Used"]}</div>
              <div><strong>Primary Benefit:</strong> ${product["Primary Benefit"]}</div>
              <div><strong>Product ID:</strong> ${product["id"]}</div>
            </div>
            <div class="category">${product["category_name"]}</div>
            <div class="image-section">
              ${mainImage ? `<img class="main-image" src="${mainImage}" alt="${product["Extract Name"]}" />` : ''}
              ${images.length > 1 ? `
                <div class="thumbnail-grid">
                  ${images.map(img => `<img src="${img}" alt="Thumbnail" onclick="this.closest('.image-section').querySelector('.main-image').src='${img}'" />`).join('')}
                </div>` : ''
              }
            </div>
          `;

          container.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        document.getElementById('product-list').innerHTML = '<p style="color:red;">Failed to load products.</p>';
      }
    }

    loadProducts();
  </script>
</body>
</html>
