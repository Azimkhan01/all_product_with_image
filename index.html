<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Catalogue</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #e5e7eb;
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }

    .header {
      background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);
      padding: 40px 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3);
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 1rem;
      color: #f0fdf4;
      opacity: 0.9;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .product-card {
      background: linear-gradient(145deg, #374151 0%, #4b5563 100%);
      border-radius: 20px;
      margin-bottom: 40px;
      overflow: hidden;
      border: 1px solid rgba(52, 211, 153, 0.2);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
    }

    .product-content {
      display: flex;
      flex-direction: row;
      gap: 40px;
      padding: 40px;
      align-items: flex-start;
    }

    .product-info {
      flex: 1;
    }

    .product-info h2 {
      font-size: 2rem;
      color: #34d399;
      margin-bottom: 20px;
    }

    .product-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }

    .detail-item {
      background: rgba(16, 185, 129, 0.1);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .detail-item strong {
      color: #10b981;
      font-size: 1rem;
    }

    .detail-item span {
      color: #d1d5db;
      display: block;
      margin-top: 5px;
    }

    .category-tag {
      display: inline-block;
      background: linear-gradient(135deg, #059669, #10b981);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 20px;
    }

    .images-container {
      flex: 0 0 400px;
      position: sticky;
      top: 20px;
    }

    .main-image {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 15px;
      margin-bottom: 15px;
      border: 2px solid rgba(52, 211, 153, 0.2);
      cursor: pointer;
      transition: 0.3s ease;
    }

    .main-image:hover {
      transform: scale(1.02);
      border-color: rgba(52, 211, 153, 0.4);
    }

    .thumbnail-grid {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 5px;
    }

    .thumbnail {
      height: 70px;
      width: 70px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid rgba(52, 211, 153, 0.2);
      cursor: pointer;
      transition: 0.3s ease;
      opacity: 0.7;
      flex-shrink: 0;
    }

    .thumbnail:hover,
    .thumbnail.active {
      opacity: 1;
      border-color: #34d399;
      transform: scale(1.05);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 10px;
    }

    .modal-content img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #34d399;
      font-size: 36px;
      font-weight: bold;
      cursor: pointer;
    }

    .loading {
      text-align: center;
      font-size: 1.5rem;
      padding: 60px;
      color: #10b981;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 4px solid rgba(52, 211, 153, 0.3);
      border-top-color: #34d399;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 15px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 1024px) {
      .product-content {
        flex-direction: column-reverse;
      }

      .images-container {
        width: 100%;
        position: static;
      }

      .main-image {
        height: 240px;
      }
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .header p {
        font-size: 0.95rem;
      }

      .product-info h2 {
        font-size: 1.5rem;
      }

      .product-details {
        grid-template-columns: 1fr;
      }

      .main-image {
        height: 200px;
      }

      .thumbnail {
        height: 50px;
        width: 50px;
      }

      .close {
        font-size: 28px;
        top: 10px;
        right: 20px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Premium Product Catalogue</h1>
  <p>Discover our extensive collection of natural extracts and botanicals</p>
</div>

<div class="container">
  <div id="product-list" class="loading">Loading Products...</div>
</div>

<div id="imgModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <div class="modal-content">
    <img id="modalImg" src="" alt="Preview"/>
  </div>
</div>

<script>
  let currentMainImages = {};

  async function loadProducts() {
    try {
      const response = await fetch('All_Products_WithImages.json');
      const products = await response.json();
      const container = document.getElementById('product-list');

      container.innerHTML = '';

      products.forEach((product, index) => {
        const card = document.createElement('div');
        card.classList.add('product-card');

        const hasImages = product.images && product.images.length > 0;
        const mainImageSrc = hasImages ? product.images[0] : '';
        currentMainImages[index] = mainImageSrc;

        const imagesHtml = hasImages ? `
          <div class="images-container">
            <img class="main-image" id="main-${index}" src="${mainImageSrc}" alt="${product["Extract Name"]}" onclick="openModal('${mainImageSrc}')">
            ${product.images.length > 1 ? `
              <div class="thumbnail-grid">
                ${product.images.map((imgUrl, imgIndex) => `
                  <img class="thumbnail ${imgIndex === 0 ? 'active' : ''}" 
                       src="${imgUrl}" 
                       onclick="changeMainImage(${index}, '${imgUrl}', this)">
                `).join('')}
              </div>
            ` : ''}
          </div>
        ` : '';

        card.innerHTML = `
          <div class="product-content">
            <div class="product-info">
              <h2>${product["Extract Name"]}</h2>
              <div class="product-details">
                <div class="detail-item">
                  <strong>Botanical Name</strong>
                  <span>${product["Botanical Name"]}</span>
                </div>
                <div class="detail-item">
                  <strong>Part Used</strong>
                  <span>${product["Part Used"]}</span>
                </div>
                <div class="detail-item">
                  <strong>Primary Benefit</strong>
                  <span>${product["Primary Benefit"]}</span>
                </div>
                <div class="detail-item">
                  <strong>Product ID</strong>
                  <span>${product["id"]}</span>
                </div>
              </div>
              <div class="category-tag">${product["category_name"]}</div>
            </div>
            ${imagesHtml}
          </div>
        `;

        container.appendChild(card);
      });
    } catch (error) {
      console.error('Error loading products:', error);
      document.getElementById('product-list').innerHTML = `
        <div style="text-align: center; padding: 60px; color: #ef4444;">
          <h2>Failed to load products</h2>
          <p>Please check if the JSON file exists and is accessible.</p>
        </div>
      `;
    }
  }

  function changeMainImage(productIndex, newSrc, thumbnailElement) {
    const mainImage = document.getElementById(`main-${productIndex}`);
    mainImage.src = newSrc;
    currentMainImages[productIndex] = newSrc;

    const thumbnails = thumbnailElement.parentElement.querySelectorAll('.thumbnail');
    thumbnails.forEach(thumb => thumb.classList.remove('active'));
    thumbnailElement.classList.add('active');

    mainImage.onclick = () => openModal(newSrc);
  }

  function openModal(src) {
    document.getElementById("imgModal").style.display = "block";
    document.getElementById("modalImg").src = src;
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById("imgModal").style.display = "none";
    document.getElementById("modalImg").src = "";
    document.body.style.overflow = 'auto';
  }

  window.onclick = function(event) {
    const modal = document.getElementById("imgModal");
    if (event.target === modal) {
      closeModal();
    }
  }

  document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
      closeModal();
    }
  });

  loadProducts();
</script>

</body>
</html>
